# Toy model for testing Blueprint system
# As per SPEC_01 Section 5

id: "toy-growth"
version: "0.1.0"

declarations:
  state:
    biomass:
      units: "g"
      dims: ["Y", "X"]
      description: "Biomass field"

  parameters:
    growth_rate:
      units: "1/d"
      description: "Growth rate parameter"

  forcings:
    temperature:
      units: "degC"
      dims: ["T", "Y", "X"]
      description: "Sea surface temperature"
    mask:
      dims: ["Y", "X"]
      description: "Land-sea mask (1=ocean, 0=land)"

process:
  - func: "biol:simple_growth"
    inputs:
      biomass: "state.biomass"
      rate: "parameters.growth_rate"
      temp: "forcings.temperature"
    outputs:
      tendency: "derived.growth_flux"

tendencies:
  biomass:
    - source: "derived.growth_flux"
