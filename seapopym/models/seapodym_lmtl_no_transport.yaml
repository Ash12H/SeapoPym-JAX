id: seapodym-lmtl-no-transport
version: "1.0"

declarations:
  state:
    biomass:
      units: "g/m^2"
      dims: [F, Y, X]
      clamp: [0.0, null]
    production:
      units: "g/m^2"
      dims: [F, C, Y, X]
      clamp: [0.0, null]

  parameters:
    lambda_0:
      units: "1/s"
      dims: [F]
    gamma_lambda:
      units: "1/delta_degC"
      dims: [F]
    tau_r_0:
      units: "s"
      dims: [F]
    gamma_tau_r:
      units: "1/delta_degC"
      dims: [F]
    t_ref:
      units: "degC"
    efficiency:
      units: "dimensionless"
      dims: [F]
    cohort_ages:
      units: "s"
      dims: [C]
    day_layer:
      units: "dimensionless"
      dims: [F]
    night_layer:
      units: "dimensionless"
      dims: [F]

  forcings:
    latitude:
      units: "degrees"
      dims: [Y]
    temperature:
      units: "degC"
      dims: [T, Z, Y, X]
    primary_production:
      units: "g/m^2/s"
      dims: [T, Y, X]
    day_of_year:
      units: "dimensionless"
      dims: [T]

process:
  # --- Environment ---
  - func: "lmtl:day_length"
    inputs:
      latitude: forcings.latitude
      day_of_year: forcings.day_of_year
    outputs:
      return: derived.day_length

  - func: "lmtl:layer_weighted_mean"
    inputs:
      forcing: forcings.temperature
      day_length: derived.day_length
      day_layer: parameters.day_layer
      night_layer: parameters.night_layer
    outputs:
      return: derived.mean_temperature

  # --- Temperature ---
  - func: "lmtl:threshold_temperature"
    inputs:
      temp: derived.mean_temperature
      min_temp: parameters.t_ref
    outputs:
      return: derived.thresholded_temperature

  - func: "lmtl:gillooly_temperature"
    inputs:
      temp: derived.thresholded_temperature
    outputs:
      return: derived.temp_norm

  - func: "lmtl:gillooly_temperature"
    inputs:
      temp: parameters.t_ref
    outputs:
      return: derived.t_ref_norm

  # --- Derived quantities ---
  - func: "lmtl:recruitment_age"
    inputs:
      temp: derived.temp_norm
      tau_r_0: parameters.tau_r_0
      gamma: parameters.gamma_tau_r
      t_ref: derived.t_ref_norm
    outputs:
      return: derived.rec_age

  # --- Dynamics ---
  - func: "lmtl:npp_injection"
    inputs:
      npp: forcings.primary_production
      efficiency: parameters.efficiency
      production: state.production
    outputs:
      return: derived.npp_injection

  - func: "lmtl:aging_flow"
    inputs:
      production: state.production
      cohort_ages: parameters.cohort_ages
      rec_age: derived.rec_age
    outputs:
      return: derived.aging_flow

  - func: "lmtl:recruitment_flow"
    inputs:
      production: state.production
      cohort_ages: parameters.cohort_ages
      rec_age: derived.rec_age
    outputs:
      prod_loss: derived.recruitment_prod_loss
      biomass_gain: derived.recruitment_gain

  - func: "lmtl:mortality"
    inputs:
      biomass: state.biomass
      temp: derived.temp_norm
      lambda_0: parameters.lambda_0
      gamma: parameters.gamma_lambda
      t_ref: derived.t_ref_norm
    outputs:
      return: derived.mortality_flux

tendencies:
  biomass:
    - source: derived.mortality_flux
    - source: derived.recruitment_gain
  production:
    - source: derived.npp_injection
    - source: derived.aging_flow
    - source: derived.recruitment_prod_loss
