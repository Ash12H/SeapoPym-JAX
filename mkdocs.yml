site_name: SeapoPym Documentation
site_description: JAX-accelerated framework for differentiable simulation of dynamical systems on N-dimensional grids
site_author: Jules Lehodey
site_url: https://ash12h.github.io/SeapoPym-JAX/

repo_name: Ash12H/SeapoPym-JAX
repo_url: https://github.com/Ash12H/SeapoPym-JAX
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore:
        - "assets/diagrams/generate.py"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
  - Concepts:
    - Blueprint & DAG: concepts/blueprint.md
    - Compilation & Config: concepts/compilation.md
    - Simulation & Engine: concepts/simulation.md
    - Optimization: concepts/optimization.md
  - Examples:
    - Framework:
      - Custom Model (Lotka-Volterra): examples/01_lotka_volterra.ipynb
      - Differentiable Simulation: examples/02_gradient.ipynb
      - Parameter Optimization: examples/03_optimization.ipynb
      - Trajectory Optimization (CartPole): examples/06_cartpole.ipynb
      - Differentiable MPC (CartPole): examples/07_cartpole_mpc.ipynb
    - SEAPODYM Models:
      - LMTL — No Transport: examples/04_lmtl_no_transport.ipynb
      - LMTL — Spatial Transport: examples/05_transport.ipynb

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ash12H/SeapoPym-JAX
