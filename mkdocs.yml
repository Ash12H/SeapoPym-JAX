site_name: SeapoPym Documentation
site_description: JAX-accelerated framework for Eulerian population dynamics on N-dimensional grids
site_author: Jules Lehodey
site_url: https://ash12h.github.io/SeapoPym-JAX/

repo_name: Ash12H/SeapoPym-JAX
repo_url: https://github.com/Ash12H/SeapoPym-JAX
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
  - mkdocs-jupyter:
      execute: false
      include_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
  - Concepts:
    - Blueprint & DAG: concepts/blueprint.md
    - Compilation & Config: concepts/compilation.md
    - Simulation & Engine: concepts/simulation.md
    - Optimization: concepts/optimization.md
  - Examples:
    - LMTL No Transport: examples/01_lmtl_no_transport.ipynb
    - Transport & Movement: examples/02_transport.ipynb
    - Optimization: examples/03_optimization.ipynb

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ash12H/SeapoPym-JAX
