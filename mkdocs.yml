site_name: SEAPOPYM-Message Documentation
site_description: Distributed Population Dynamics Simulation using Ray and JAX
site_author: SEAPOPYM-Message Contributors
site_url: https://seapopym-message.readthedocs.io

repo_name: seapopym-message
repo_url: https://github.com/yourusername/seapopym-message
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Architecture:
      - Overview: architecture/overview.md
      - Event Scheduler: architecture/scheduler.md
      - Kernel & Units: architecture/kernel.md
      - Workers: architecture/workers.md
      - 2D Grids: architecture/2d-grids.md
      - Transport Strategies: architecture/transport.md
  - API Reference:
      - Core: api/core.md
      - Distributed: api/distributed.md
      - Kernels: api/kernels.md
      - Forcing: api/forcing.md
      - Utils: api/utils.md
  - Tutorials:
      - Simple 0D Model: tutorials/0d-model.md
      - 1D Grid with Diffusion: tutorials/1d-diffusion.md
      - 2D Spatial Model: tutorials/2d-spatial.md
      - Temperature Forcing: tutorials/forcing.md
      - Scalability: tutorials/scalability.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Code Style: development/style.md
  - About:
      - Changelog: about/changelog.md
      - License: about/license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/seapopym-message
